<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}ECN{% endblock %}</title>
<!-- Tailwind Play CDN: compila em runtime, não é compatível com Subresource
     Integrity (o conteúdo servido varia). Aceitável para uma demo; antes de um
     uso mais sério, trocar por um build estático do Tailwind. -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"
        integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"
        crossorigin="anonymous"></script>
{% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
<header class="bg-sky-600 text-white">
  <nav class="max-w-6xl mx-auto flex items-center justify-between px-4 py-2 text-sm">
    {% if user.is_authenticated %}
    <div class="flex items-center gap-4 ml-auto">
      <span>{{ user.get_username }}</span>
      <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button class="underline">Sair</button></form>
    </div>
    {% endif %}
  </nav>
</header>
<main class="max-w-6xl mx-auto px-4 py-8">
  {% if messages %}
    <div class="mb-6 space-y-2">
      {% for message in messages %}
        <div class="rounded-md px-4 py-2 text-sm {% if message.tags == 'error' %}bg-red-100 text-red-800{% else %}bg-green-100 text-green-800{% endif %}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
