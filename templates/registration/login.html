{% extends "base.html" %}
{% block title %}Login - CAI{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto bg-white border rounded-lg p-6">
  <h1 class="text-xl font-semibold mb-4">Entrar</h1>
  <form method="post">
    {% csrf_token %}
    {% if form.errors %}
      <p class="text-red-600 text-sm mb-3">Usuário ou senha inválidos.</p>
    {% endif %}
    <div class="mb-3">
      <label class="block text-sm font-medium mb-1" for="id_username">Usuário</label>
      <input class="w-full border rounded px-3 py-2" type="text" name="username" id="id_username" required>
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium mb-1" for="id_password">Senha</label>
      <input class="w-full border rounded px-3 py-2" type="password" name="password" id="id_password" required>
    </div>
    <button class="w-full bg-slate-900 text-white rounded px-3 py-2" type="submit">Entrar</button>
  </form>
</div>
{% endblock %}
