{% for comunicado in comunicados %}
  <div class="px-3 py-2 hover:bg-sky-50 cursor-pointer text-sm border-b border-slate-100 last:border-b-0"
       onclick="selecionarComunicado({{ comunicado.pk }})">
    <span class="font-medium text-sky-700">{{ comunicado.cai_fiscal }}</span>
    <span class="text-slate-500"> — {{ comunicado.cliente }}</span>
  </div>
{% empty %}
  <div class="px-3 py-2 text-sm text-slate-500">Nenhum Comunicado encontrado.</div>
{% endfor %}
