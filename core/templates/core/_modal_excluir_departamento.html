<div id="excluir-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-sm overflow-hidden">
    <div class="bg-sky-500 text-white px-5 py-3 flex items-center justify-between">
      <h2 class="font-semibold">Excluir Departamento</h2>
      <button type="button" onclick="fecharExcluirModal()"
              class="w-6 h-6 rounded-full border border-white/60 flex items-center justify-center hover:bg-white/10">
        &times;
      </button>
    </div>
    <div class="p-5">
      <p class="text-sm text-slate-700 mb-5">
        Tem certeza que deseja excluir o departamento <strong id="excluir-nome"></strong>?
        Essa ação não pode ser desfeita.
      </p>
      <form id="excluir-form" method="post">
        {% csrf_token %}
        <div class="flex items-center justify-end gap-3">
          <button type="button" onclick="fecharExcluirModal()" class="text-sm text-slate-600 hover:underline">
            Não
          </button>
          <button type="submit" class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded px-4 py-2">
            Sim, excluir
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
function abrirExcluirModal(url, nome) {
  document.getElementById('excluir-form').action = url;
  document.getElementById('excluir-nome').textContent = nome;
  document.getElementById('excluir-modal').classList.remove('hidden');
}
function fecharExcluirModal() {
  document.getElementById('excluir-modal').classList.add('hidden');
}
</script>
