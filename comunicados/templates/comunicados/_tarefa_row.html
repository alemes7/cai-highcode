<div class="tarefa-row grid grid-cols-1 md:grid-cols-[1fr_1fr_1fr_1fr_auto] gap-3 items-start border-b border-slate-200 py-3">
  <div>
    {{ tarefa_form.departamento }}
  </div>
  <div>
    {{ tarefa_form.responsavel_principal }}
  </div>
  <div class="tarefa-info-display text-xs text-slate-500 pt-2">—</div>
  <div>
    {{ tarefa_form.comentarios }}
  </div>
  <button type="button"
          onclick="this.closest('.tarefa-row').remove()"
          class="text-red-500 hover:text-red-700 text-lg leading-none pt-2"
          title="Remover">
    &times;
  </button>
</div>
