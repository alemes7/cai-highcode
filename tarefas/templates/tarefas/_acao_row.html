<div class="acao-row grid grid-cols-1 md:grid-cols-[1.5fr_1fr_1fr_1fr_auto] gap-3 items-start border-b border-slate-200 py-3">
  {% if acao_form.non_field_errors %}
    <p class="text-red-600 text-xs md:col-span-5">{{ acao_form.non_field_errors.0 }}</p>
  {% endif %}
  <div>
    {{ acao_form.descricao }}
  </div>
  <div>
    <p class="border border-slate-300 rounded px-3 py-2 bg-slate-100 text-sm">{{ departamento }}</p>
  </div>
  <div>
    {{ acao_form.responsavel }}
  </div>
  <div>
    {{ acao_form.prazo_original }}
  </div>
  <button type="button"
          onclick="this.closest('.acao-row').remove()"
          class="text-red-500 hover:text-red-700 text-lg leading-none pt-2"
          title="Remover">
    &times;
  </button>
</div>
